<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jotron Certificate Management</title>
    <style>
        :root {
            --primary: #0056b3;
            --primary-hover: #004085;
            --success: #28a745;
            --error: #dc3545;
            --bg: #f5f5f5;
            --surface: #ffffff;
            --border: #dddddd;
            --text-muted: #666666;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 20px; background: var(--bg); color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: var(--surface); padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2, h3 { margin-top: 0; color: #111; }
        form, .filters { margin-bottom: 25px; padding: 20px; border: 1px solid var(--border); border-radius: 6px; background: #fafafa; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 0.9rem; font-weight: 600; margin-bottom: 5px; }
        input, select { padding: 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 0.95rem; background: var(--surface); }
        input:focus, select:focus { border-color: var(--primary); outline: none; }
        .btn { padding: 12px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: background 0.2s; text-align: center; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-secondary { background: var(--success); color: white; }
        .btn-secondary:hover { background: #218838; }
        .btn-danger { background: var(--error); color: white; padding: 5px 10px; font-size: 0.85rem; border-radius: 4px; }
        .btn-danger:hover { background: #bd2130; }
        .table-responsive { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
        th { background-color: #f8f9fa; font-weight: 600; }
        .skeleton-text { height: 16px; background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 4px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .error-msg { color: var(--error); font-weight: bold; text-align: center; }
        .empty-msg { color: var(--text-muted); text-align: center; }
        .action-cell { display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>
<div class="container">
    <h2>Jotron Certificate Management</h2>

    <form id="uploadForm" enctype="multipart/form-data">
        <h3>Upload a new certificate</h3>
        <div class="form-grid">
            <div class="form-group">
                <label for="certNo">Certificate number</label>
                <input type="text" id="certNo" name="CertificateNumber" required>
            </div>
            <div class="form-group">
                <label for="certType">Certification type</label>
                <select id="certType" name="CertificateType" required>
                    <option value="Declaration of conformity">Declaration of conformity</option>
                    <option value="Green passport">Green passport</option>
                    <option value="Type approval">Type approval</option>
                    <option value="Product certificate">Product certificate</option>
                </select>
            </div>
            <div class="form-group">
                <label for="notifiedBody">Notified Body</label>
                <input type="text" id="notifiedBody" name="NotifiedBody" required>
            </div>
            <div class="form-group">
                <label for="issueDate">Issue date</label>
                <input type="date" id="issueDate" name="DateOfIssue" required>
            </div>
            <div class="form-group">
                <label for="expDate">Expiry date</label>
                <input type="date" id="expDate" name="ExpiryDate" required>
            </div>
            <div class="form-group">
                <label for="rev">Revision</label>
                <input type="text" id="rev" name="Rev" placeholder="e.g. 01" required>
            </div>
            <div class="form-group">
                <label for="revDate">Revision date</label>
                <input type="date" id="revDate" name="RevisionIssueDate" required>
            </div>
            <div class="form-group">
                <label for="reason">Reason</label>
                <input type="text" id="reason" name="Reason" required>
            </div>
            <div class="form-group">
                <label for="author">Author</label>
                <input type="text" id="author" name="Author" required>
            </div>
            <div class="form-group">
                <label for="approval">Approver</label>
                <input type="text" id="approval" name="Approval" required>
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label for="file">Certificate file (PDF or image)</label>
                <input type="file" id="file" name="File" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Upload certificate</button>
    </form>

    <div class="filters">
        <h3>Search and filtering</h3>
        <div class="form-grid">
            <div class="form-group">
                <label for="searchNumber">Search by certificate number</label>
                <input type="text" id="searchNumber" placeholder="Enter a number...">
            </div>
            <div class="form-group">
                <label for="filterType">Filter by type</label>
                <select id="filterType">
                    <option value="">All types</option>
                    <option value="Declaration of conformity">Declaration of conformity</option>
                    <option value="Green passport">Green passport</option>
                    <option value="Type approval">Type approval</option>
                    <option value="Product certificate">Product certificate</option>
                </select>
            </div>
        </div>
        <button onclick="loadCertificates()" class="btn btn-secondary" style="margin-top: 10px;">Apply filters</button>
    </div>

    <h3>Registered certificates</h3>
    <div class="table-responsive">
        <table id="certTable">
            <thead>
                <tr>
                    <th>Number</th>
                    <th>Type</th>
                    <th>Notified Body</th>
                    <th>Issued</th>
                    <th>Expires</th>
                    <th>Latest revision</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="certTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const tbody = document.getElementById('certTableBody');

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        
        try {
            const response = await fetch('/certificates', { method: 'POST', body: formData });
            if (response.ok) {
                alert('Certificate uploaded successfully.');
                e.target.reset();
                await loadCertificates();
            } else {
                const err = await response.json();
                alert('Validation errors:\n' + JSON.stringify(err.errors || err, null, 2));
            }
        } catch (error) {
            alert('Critical error while communicating with the backend.');
        }
    });

    function showSkeleton() {
        tbody.innerHTML = Array(3).fill(`
            <tr>
                ${'<td><div class="skeleton-text"></div></td>'.repeat(7)}
            </tr>
        `).join('');
    }

    async function loadCertificates() {
        showSkeleton();
        
        const num = document.getElementById('searchNumber').value.trim();
        const type = document.getElementById('filterType').value;
        
        const params = new URLSearchParams();
        if (num) params.append('number', num);
        if (type) params.append('type', type);

        try {
            const response = await fetch(`/certificates?${params.toString()}`);
            if (!response.ok) throw new Error();
            const certs = await response.json();
            
            tbody.innerHTML = '';
            
            if (certs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="empty-msg">No certificates match the current search criteria.</td></tr>`;
                return;
            }
            
            certs.forEach(c => {
                const latestRev = c.revisions && c.revisions.length > 0 ? c.revisions[c.revisions.length - 1].rev : 'N/A';
                const row = `<tr>
                    <td>${escapeHtml(c.certificateNumber)}</td>
                    <td>${escapeHtml(c.certificateType)}</td>
                    <td>${escapeHtml(c.notifiedBody)}</td>
                    <td>${new Date(c.dateOfIssue).toLocaleDateString('en-GB')}</td>
                    <td>${new Date(c.expiryDate).toLocaleDateString('en-GB')}</td>
                    <td>${escapeHtml(latestRev)}</td>
                    <td class="action-cell">
                        <a href="/certificates/${c.id}/download" class="btn-link" download>Download</a>
                        <button onclick="deleteCertificate(${c.id})" class="btn btn-danger">Delete</button>
                    </td>
                </tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="7" class="error-msg">Could not fetch certificates from the API.</td></tr>`;
        }
    }

    async function deleteCertificate(id) {
        if (!confirm('Are you sure you want to permanently delete this certificate?')) return;
        try {
            const response = await fetch(`/certificates/${id}`, { method: 'DELETE' });
            if (response.ok) {
                await loadCertificates();
            } else {
                alert('Deletion failed on the server side.');
            }
        } catch {
            alert('Network error while attempting to delete.');
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    loadCertificates();
</script>
</body>
</html>
